<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成都周边徒步线路库</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #071018;
    --bg2: #101d2d;
    --surface: rgba(16, 25, 39, 0.82);
    --surface2: #18273a;
    --surface3: #22354d;
    --border: rgba(124, 151, 181, 0.26);
    --border-strong: rgba(124, 151, 181, 0.4);
    --text: #eaf2ff;
    --text-dim: #9db0c6;
    --accent: #ffb347;
    --accent2: #66b3ff;
    --green: #3fb950;
    --red: #f87171;
    --orange: #d29922;
    --purple: #b794f6;
    --teal: #35d7c4;
    --medal: #f0b54a;
    --shadow: 0 14px 34px rgba(0, 0, 0, 0.32);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background:
      radial-gradient(circle at 18% -12%, rgba(102, 179, 255, 0.22), transparent 36%),
      radial-gradient(circle at 85% 6%, rgba(255, 179, 71, 0.18), transparent 34%),
      linear-gradient(170deg, var(--bg), var(--bg2) 52%, #0a1320);
    color: var(--text);
    font-family: 'Noto Serif SC', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before,
  body::after {
    content: '';
    position: fixed;
    pointer-events: none;
    z-index: -1;
  }

  body::before {
    top: -140px;
    right: -120px;
    width: 360px;
    height: 360px;
    background: radial-gradient(circle, rgba(102, 179, 255, 0.12), transparent 68%);
  }

  body::after {
    bottom: -180px;
    left: -150px;
    width: 420px;
    height: 420px;
    background: radial-gradient(circle, rgba(255, 179, 71, 0.1), transparent 70%);
  }

  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(180deg, rgba(9, 15, 25, 0.95), rgba(9, 15, 25, 0.84));
    backdrop-filter: blur(14px) saturate(140%);
    border-bottom: 1px solid var(--border);
    padding: 14px clamp(14px, 2.2vw, 28px);
    display: flex;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.18);
  }

  .title-block h1 {
    font-size: clamp(19px, 2.1vw, 24px);
    font-weight: 700;
    letter-spacing: 0.03em;
    color: #ffd89a;
    text-shadow: 0 0 24px rgba(255, 179, 71, 0.2);
  }

  .title-block p {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
    margin-top: 4px;
    letter-spacing: 0.08em;
  }

  .controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    flex: 1;
    align-items: center;
    justify-content: flex-end;
    background: rgba(20, 34, 52, 0.55);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px;
  }

  .search-box {
    position: relative;
  }

  .search-box input {
    background: rgba(13, 22, 34, 0.82);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px 8px 34px;
    border-radius: 10px;
    font-size: 13px;
    font-family: 'Noto Serif SC', serif;
    width: 240px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-box input::placeholder {
    color: #8ea2b8;
  }

  .search-box input:focus {
    outline: none;
    border-color: var(--accent2);
    box-shadow: 0 0 0 3px rgba(102, 179, 255, 0.16);
  }

  .search-box::before {
    content: '⌕';
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 14px;
  }

  .filter-group {
    display: flex;
    gap: 6px;
    align-items: center;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: rgba(13, 22, 34, 0.6);
    padding: 6px 8px;
  }

  .filter-label {
    font-size: 10px;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
    white-space: nowrap;
    letter-spacing: 0.08em;
  }

  select {
    background: transparent;
    border: none;
    color: var(--text);
    padding: 1px 2px;
    border-radius: 6px;
    font-size: 12px;
    font-family: 'Noto Serif SC', serif;
    cursor: pointer;
    min-width: 64px;
  }

  select:focus {
    outline: none;
  }

  .btn-toggle {
    background: rgba(13, 22, 34, 0.66);
    border: 1px solid var(--border);
    color: #c7d7eb;
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 12px;
    font-family: 'Noto Serif SC', serif;
    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap;
  }

  .btn-toggle:hover,
  .btn-toggle.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(255, 179, 71, 0.12);
    transform: translateY(-1px);
  }

  .stats-bar {
    padding: 12px clamp(14px, 2.2vw, 28px);
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }

  .stats-bar > div {
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: rgba(20, 33, 49, 0.6);
    backdrop-filter: blur(6px);
  }

  .stats-bar span {
    color: var(--text);
    font-weight: 700;
  }

  .main {
    padding: 18px clamp(12px, 2vw, 28px) 28px;
    max-width: 1600px;
    margin: 0 auto;
  }

  @keyframes rise-in {
    from {
      opacity: 0;
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .level-group {
    margin-bottom: 22px;
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    background: linear-gradient(180deg, rgba(22, 34, 50, 0.72), rgba(14, 24, 36, 0.66));
    box-shadow: var(--shadow);
    animation: rise-in 0.36s ease both;
  }

  .level-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
    background: rgba(14, 23, 35, 0.58);
    transition: background 0.2s;
  }

  .level-header:hover {
    background: rgba(25, 40, 60, 0.7);
  }

  .level-badge {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 999px;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }

  .level-name {
    font-size: 16px;
    font-weight: 700;
    flex: 1;
  }

  .level-count {
    font-size: 11px;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
  }

  .collapse-arrow {
    color: var(--text-dim);
    font-size: 12px;
    transition: transform 0.3s;
  }

  .level-group.collapsed .collapse-arrow { transform: rotate(-90deg); }
  .level-group.collapsed .table-wrapper { display: none; }

  .table-wrapper {
    overflow-x: auto;
  }

  .table-wrapper::-webkit-scrollbar {
    height: 8px;
  }

  .table-wrapper::-webkit-scrollbar-thumb {
    background: rgba(124, 151, 181, 0.34);
    border-radius: 99px;
  }

  table {
    width: 100%;
    min-width: 900px;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead th {
    background: rgba(255, 255, 255, 0.04);
    padding: 10px 14px;
    text-align: left;
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: color 0.2s;
    user-select: none;
  }

  thead th:hover { color: var(--text); }
  thead th.sorted { color: var(--accent2); }
  thead th .sort-icon { margin-left: 4px; opacity: 0.5; }
  thead th.sorted .sort-icon { opacity: 1; }

  tbody tr {
    border-bottom: 1px solid rgba(124, 151, 181, 0.2);
    transition: background 0.18s ease;
  }

  tbody tr:last-child { border-bottom: none; }

  tbody tr:hover {
    background: rgba(102, 179, 255, 0.06);
  }

  tbody tr.hidden { display: none; }

  td {
    padding: 11px 14px;
    vertical-align: middle;
    white-space: nowrap;
  }

  .col-name {
    font-weight: 600;
    font-size: 13px;
    max-width: 230px;
    white-space: normal;
    line-height: 1.45;
  }

  .col-location {
    color: var(--text-dim);
    font-size: 12px;
  }

  .col-km {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--accent2);
  }

  .col-climb {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--teal);
  }

  .col-drive {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }

  .col-season {
    font-size: 11px;
    color: var(--purple);
  }

  .col-notes {
    font-size: 11px;
    color: var(--text-dim);
    max-width: 300px;
    white-space: normal;
    line-height: 1.55;
  }

  .tag {
    display: inline-block;
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    padding: 2px 7px;
    border-radius: 999px;
    margin: 2px 3px 2px 0;
    white-space: nowrap;
  }

  .tag-medal { background: rgba(240, 165, 0, 0.16); color: var(--medal); border: 1px solid rgba(240, 165, 0, 0.34); }
  .tag-family { background: rgba(63, 185, 80, 0.12); color: var(--green); border: 1px solid rgba(63, 185, 80, 0.3); }
  .tag-classic { background: rgba(88, 166, 255, 0.14); color: var(--accent2); border: 1px solid rgba(88, 166, 255, 0.32); }
  .tag-hot { background: rgba(248, 113, 113, 0.14); color: var(--red); border: 1px solid rgba(248, 113, 113, 0.34); }
  .tag-culture { background: rgba(183, 148, 246, 0.14); color: var(--purple); border: 1px solid rgba(183, 148, 246, 0.32); }

  .fav-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 15px;
    color: rgba(124, 151, 181, 0.55);
    transition: all 0.2s;
    padding: 0;
    line-height: 1;
  }

  .fav-btn:hover,
  .fav-btn.active {
    color: var(--accent);
    transform: scale(1.2);
  }

  .no-results {
    text-align: center;
    margin-top: 14px;
    padding: 38px 20px;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    border: 1px dashed var(--border-strong);
    border-radius: 14px;
    background: rgba(18, 29, 43, 0.56);
    display: none;
  }

  .climb-cell {
    position: relative;
  }

  .climb-bg {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    opacity: 0.09;
    pointer-events: none;
    border-radius: 3px;
  }

  .l0 { --lc: #52d68a; }
  .l1 { --lc: #3fb950; }
  .l2 { --lc: #58a6ff; }
  .l3 { --lc: #d29922; }
  .l4 { --lc: #f0a500; }
  .l5 { --lc: #f78166; }
  .l6 { --lc: #f85149; }
  .l7 { --lc: #ff7b72; }
  .l8 { --lc: #da3633; }
  .l9 { --lc: #bc8cff; }
  .l10 { --lc: #e040fb; }

  @media (max-width: 1100px) {
    .title-block {
      width: 100%;
    }

    .controls {
      width: 100%;
      justify-content: flex-start;
    }
  }

  @media (max-width: 900px) {
    .search-box {
      flex: 1 1 220px;
      min-width: 180px;
    }

    .search-box input {
      width: 100%;
    }

    .stats-bar {
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .stats-bar > div {
      text-align: center;
    }
  }

  @media (max-width: 780px) {
    .header {
      padding: 12px;
      gap: 12px;
    }

    .title-block h1 {
      font-size: 18px;
    }

    .controls {
      border-radius: 12px;
      padding: 8px;
    }

    .filter-group {
      padding: 5px 7px;
    }

    .btn-toggle {
      padding: 7px 10px;
    }

    .main {
      padding: 12px 10px 22px;
    }

    .level-group {
      margin-bottom: 14px;
      border-radius: 12px;
    }

    .table-wrapper {
      padding: 10px;
      overflow: visible;
    }

    table,
    thead,
    tbody,
    tr,
    td {
      display: block;
      width: 100%;
    }

    table {
      min-width: 0;
    }

    thead {
      display: none;
    }

    tbody {
      display: grid;
      gap: 10px;
    }

    tbody tr {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(11, 20, 31, 0.78);
      padding: 10px 12px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
    }

    tbody tr:last-child {
      border-bottom: 1px solid var(--border);
    }

    td {
      border-bottom: 1px dashed rgba(124, 151, 181, 0.24);
      padding: 6px 0;
      white-space: normal;
      display: grid;
      grid-template-columns: 88px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      font-size: 12px;
    }

    td::before {
      content: attr(data-label);
      color: var(--text-dim);
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 10px;
      line-height: 1.4;
    }

    td:first-child {
      grid-template-columns: 1fr;
      border-bottom: none;
      padding: 0 0 6px;
    }

    td:first-child::before {
      display: none;
    }

    td:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .fav-btn {
      font-size: 18px;
    }

    .col-name {
      font-size: 14px;
    }

    .col-notes {
      max-width: none;
    }

    .climb-bg {
      top: 16%;
      bottom: 16%;
      border-radius: 999px;
      opacity: 0.15;
    }
  }
</style>
</head>
<body>

<div class="header">
  <div class="title-block">
    <h1>🏔 成都周边徒步线路库</h1>
    <p>CHENGDU HIKING ROUTE DATABASE</p>
  </div>
  <div class="controls">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索线路、地区..." oninput="filterRoutes()">
    </div>
    <div class="filter-group">
      <span class="filter-label">难度</span>
      <select id="levelFilter" onchange="filterRoutes()">
        <option value="">全部</option>
        <option value="0.5">0.5星</option>
        <option value="1">1星</option>
        <option value="2">2星</option>
        <option value="3">3星</option>
        <option value="4">4星</option>
        <option value="5">5星</option>
        <option value="6">6星</option>
        <option value="7">7星</option>
        <option value="8">8星</option>
        <option value="9">9星</option>
        <option value="10">10星</option>
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label">标签</span>
      <select id="tagFilter" onchange="filterRoutes()">
        <option value="">全部</option>
        <option value="medal">🥇 有奖牌</option>
        <option value="family">👶 亲子</option>
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label">月份</span>
      <select id="monthFilter" onchange="filterRoutes()">
        <option value="">全部</option>
        <option value="1">1月</option>
        <option value="2">2月</option>
        <option value="3">3月</option>
        <option value="4">4月</option>
        <option value="5">5月</option>
        <option value="6">6月</option>
        <option value="7">7月</option>
        <option value="8">8月</option>
        <option value="9">9月</option>
        <option value="10">10月</option>
        <option value="11">11月</option>
        <option value="12">12月</option>
      </select>
    </div>
    <button class="btn-toggle" id="favBtn" onclick="toggleFavFilter()">☆ 收藏</button>
    <button class="btn-toggle" onclick="expandAll()">展开全部</button>
    <button class="btn-toggle" onclick="collapseAll()">收起全部</button>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-item">共 <span id="totalCount">0</span> 条线路</div>
  <div class="stat-item">显示 <span id="visibleCount">0</span> 条</div>
  <div class="stat-item">收藏 <span id="favCount">0</span> 条</div>
</div>

<div class="main" id="mainContent"></div>
<div class="no-results" id="noResults">暂无符合条件的线路</div>

<script>

}

function getDiffColor(l) {
  const n = parseFloat(l);
  const ratio = Math.min(n/10,1);
  const colors = ['#52d68a','#3fb950','#58a6ff','#d29922','#f0a500','#f78166','#f85149','#ff7b72','#da3633','#bc8cff','#e040fb'];
  const idx = Math.min(Math.floor(n), colors.length-1);
  return colors[idx];
}

function renderTags(r) {
  let t = '';
  if(r.medal) t += '<span class="tag tag-medal">🥇奖牌</span>';
  if(r.family) t += '<span class="tag tag-family">👶亲子</span>';
  if(r.classic) t += '<span class="tag tag-classic">★经典</span>';
  if(r.hot) t += '<span class="tag tag-hot">🔥热门</span>';
  if(r.culture) t += '<span class="tag tag-culture">🏛文化</span>';
  return t;
}

function monthInRange(months, target) {
  if(!months || months==='四季') return true;
  const parts = months.split('/');
  for(const part of parts) {
    const m = part.match(/(\d+)-(\d+)/);
    if(m) {
      let s=parseInt(m[1]), e=parseInt(m[2]);
      if(s<=e && target>=s && target<=e) return true;
      if(s>e && (target>=s || target<=e)) return true;
    }
    const single = part.match(/^(\d+)月?$/);
    if(single && parseInt(single[1])===target) return true;
  }
  return false;
}

function buildTable() {
  const main = document.getElementById('mainContent');
  main.innerHTML = '';
  allRows = [];

  const levels = [...new Set(RAW.map(r=>r.level))].sort((a,b)=>parseFloat(a)-parseFloat(b));

  for(const lv of levels) {
    const meta = LEVEL_META[lv] || {label:`${lv}星`,cls:'l1',color:'#58a6ff'};
    const routes = RAW.filter(r=>r.level===lv);

    const group = document.createElement('div');
    group.className = 'level-group';
    group.dataset.level = lv;

    const clsName = getLevelClass(lv);
    const color = meta.color;

    group.innerHTML = `
      <div class="level-header ${clsName}" onclick="toggleGroup(this.parentElement)">
        <span class="level-badge" style="background:${color}22;color:${color};border:1px solid ${color}44">${lv}★</span>
        <span class="level-name">${meta.label}</span>
        <span class="level-count" id="cnt_${lv}">${routes.length} 条</span>
        <span class="collapse-arrow">▼</span>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th style="width:30px"></th>
              <th onclick="sortTable('area')" class="sortable">属地 <span class="sort-icon">↕</span></th>
              <th onclick="sortTable('name')" class="sortable">线路名称 <span class="sort-icon">↕</span></th>
              <th onclick="sortTable('km')" class="sortable">里程km <span class="sort-icon">↕</span></th>
              <th onclick="sortTable('climb')" class="sortable">爬升m <span class="sort-icon">↕</span></th>
              <th onclick="sortTable('drive')" class="sortable">南门车程h <span class="sort-icon">↕</span></th>
              <th>推介月份</th>
              <th>亮点标签</th>
              <th>特色</th>
            </tr>
          </thead>
          <tbody id="tbody_${lv}">
          </tbody>
        </table>
      </div>
    `;

    main.appendChild(group);

    // level 可能是 "0.5"，用 querySelector('#id') 会把 "." 当成 class 选择器
    const tbody = document.getElementById(`tbody_${lv}`);
    for(const r of routes) {
      const id = r.level+'_'+r.name;
      const isFav = favorites.includes(id);
      const color2 = getDiffColor(lv);

      const tr = document.createElement('tr');
      tr.dataset.id = id;
      tr.dataset.area = r.area;
      tr.dataset.name = r.name;
      tr.dataset.km = r.km||0;
      tr.dataset.climb = r.climb||0;
      tr.dataset.drive = r.drive||0;
      tr.dataset.months = r.months||'';
      tr.dataset.medal = r.medal?'1':'0';
      tr.dataset.family = r.family?'1':'0';
      tr.dataset.fav = isFav?'1':'0';

      const maxClimb = 6400;
      const climbPct = r.climb ? Math.min(r.climb/maxClimb*100, 100) : 0;

      tr.innerHTML = `
        <td data-label="收藏"><button class="fav-btn ${isFav?'active':''}" onclick="toggleFav('${id}',this)" title="收藏">★</button></td>
        <td class="col-location" data-label="属地">${r.area}</td>
        <td class="col-name" data-label="线路">${r.name}</td>
        <td class="col-km" data-label="里程">${r.km!=null?r.km+'km':'—'}</td>
        <td class="col-climb climb-cell" data-label="爬升" style="position:relative">
          <div class="climb-bg" style="width:${climbPct}%;background:${color2}"></div>
          <span style="position:relative">${r.climb!=null?r.climb+'m':'—'}</span>
        </td>
        <td class="col-drive" data-label="车程">${r.drive!=null?r.drive+'h':'—'}</td>
        <td class="col-season" data-label="月份">${r.months||'—'}</td>
        <td data-label="标签">${renderTags(r) || '—'}</td>
        <td class="col-notes" data-label="特色">${r.notes||''}</td>
      `;
      tbody.appendChild(tr);
      allRows.push({tr, r, lv});
    }
  }
  updateCounts();
}

function toggleGroup(el) {
  el.classList.toggle('collapsed');
}

function expandAll() {
  document.querySelectorAll('.level-group').forEach(g=>g.classList.remove('collapsed'));
}

function collapseAll() {
  document.querySelectorAll('.level-group').forEach(g=>g.classList.add('collapsed'));
}

function filterRoutes() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const lv = document.getElementById('levelFilter').value;
  const tag = document.getElementById('tagFilter').value;
  const mo = parseInt(document.getElementById('monthFilter').value)||0;

  for(const {tr, r} of allRows) {
    let show = true;
    if(q && !(r.name.toLowerCase().includes(q)||r.area.toLowerCase().includes(q)||r.notes.toLowerCase().includes(q))) show=false;
    if(lv && r.level!==lv) show=false;
    if(tag==='medal' && !r.medal) show=false;
    if(tag==='family' && !r.family) show=false;
    if(mo && !monthInRange(r.months, mo)) show=false;
    if(showFavOnly && !favorites.includes(r.level+'_'+r.name)) show=false;
    tr.classList.toggle('hidden', !show);
  }
  updateCounts();
}

function toggleFav(id, btn) {
  const idx = favorites.indexOf(id);
  if(idx===-1) {
    favorites.push(id);
    btn.classList.add('active');
  } else {
    favorites.splice(idx,1);
    btn.classList.remove('active');
  }
  localStorage.setItem('hikeFavs', JSON.stringify(favorites));
  // update tr data
  const tr = document.querySelector(`tr[data-id="${id}"]`);
  if(tr) tr.dataset.fav = favorites.includes(id)?'1':'0';
  updateCounts();
  if(showFavOnly) filterRoutes();
}

function toggleFavFilter() {
  showFavOnly = !showFavOnly;
  document.getElementById('favBtn').classList.toggle('active', showFavOnly);
  filterRoutes();
}

function sortTable(col) {
  if(sortCol===col) sortDir*=-1; else { sortCol=col; sortDir=1; }
  document.querySelectorAll('thead th').forEach(th=>th.classList.remove('sorted'));
  document.querySelectorAll(`thead th[onclick="sortTable('${col}')"]`).forEach(th=>th.classList.add('sorted'));

  for(const group of document.querySelectorAll('.level-group')) {
    const tbody = group.querySelector('tbody');
    if(!tbody) continue;
    const rows = [...tbody.querySelectorAll('tr')];
    rows.sort((a,b)=>{
      let va = a.dataset[col]||'', vb = b.dataset[col]||'';
      if(['km','climb','drive'].includes(col)) { va=parseFloat(va)||0; vb=parseFloat(vb)||0; }
      if(va<vb) return -sortDir;
      if(va>vb) return sortDir;
      return 0;
    });
    rows.forEach(r=>tbody.appendChild(r));
  }
}

function updateCounts() {
  const total = allRows.length;
  const visible = allRows.filter(({tr})=>!tr.classList.contains('hidden')).length;
  const favs = favorites.length;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('visibleCount').textContent = visible;
  document.getElementById('favCount').textContent = favs;

  // update per-level counts
  for(const lv of Object.keys(LEVEL_META)) {
    const cnt = allRows.filter(({tr,r})=>r.level===lv && !tr.classList.contains('hidden')).length;
    const el = document.getElementById('cnt_'+lv);
    if(el) el.textContent = cnt + ' 条';
  }

  const noRes = document.getElementById('noResults');
  noRes.style.display = visible===0?'block':'none';
}

buildTable();
</script>
</body>
</html>
